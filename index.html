<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMYAZA STREAM // Premium Media Player</title>
    <style>
        body { margin:0; background:#020612; color:#00d4ff; font-family:monospace; overflow-x:hidden; padding:10px; }
        #space { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; pointer-events:none; }
        #app { position:relative; z-index:2; max-width:420px; margin:0 auto; display:flex; flex-direction:column; gap:8px; }
        .card { background:rgba(7,20,41,0.85); border:1px solid #132f54; padding:12px; border-radius:8px; text-align:center; box-shadow:0 4px 15px rgba(0,212,255,0.05); }
        .title { font-size:18px; font-weight:bold; color:#fff; text-shadow:0 0(5px) #00d4ff; letter-spacing:2px; }
        .media-lbl { font-size:10px; color:#88a0c0; text-transform:uppercase; margin-bottom:6px; text-align:left; font-weight:bold; border-bottom:1px solid #132f54; padding-bottom:3px; }
        
        /* Video Viewport Formats */
        video { width:100%; height:180px; background:#000; border-radius:6px; border:1px solid #132f54; display:block; margin-bottom:8px; }
        
        /* Interactive Media Control Panels */
        .controls { display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; margin-top:5px; }
        button { background:#071a36; border:1px solid #00d4ff; color:#00d4ff; padding:8px 0; cursor:pointer; font-size:10px; font-weight:bold; border-radius:4px; text-transform:uppercase; }
        button:active { background:#00d4ff; color:#000; }
        
        /* Audio Player Custom Tracks */
        .audio-track { display:flex; align-items:center; justify-content:space-between; background:#030d1e; padding:6px 10px; border-radius:4px; font-size:11px; color:#fff; margin-bottom:6px; border:1px solid #0e223b; }
        
        /* Highly Decorated Footer Anchor */
        #ftr { text-align:center; font-weight:bold; font-size:11px; color:#fff; text-shadow:0 0 5px #00d4ff, 0 0 10px #00ffff; border-top:1px dashed rgba(0,212,255,0.2); padding-top:8px; margin-top:10px; letter-spacing:3px; }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <div id="app">
        
        <div class="card">
            <div class="title">SAMYAZA STREAM</div>
            <div style="font-size:9px; color:#88a0c0; margin-top:2px;">MULTIMEDIA SUITE MATRIX</div>
        </div>

        <!-- 📺 High Graphics Video Player Module -->
        <div class="card">
            <div class="media-lbl">📺 Automated HD Video Deck</div>
            <!-- Uses an open-source high-quality test video loop -->
            <video id="video-player" loop playsinline src="https://googleapis.com"></video>
            <div class="controls">
                <button onclick="document.getElementById('video-player').play()">▶ PLAY</button>
                <button onclick="document.getElementById('video-player').pause()">⏸ PAUSE</button>
                <button onclick="document.getElementById('video-player').muted = !document.getElementById('video-player').muted">🔇 MUTE</button>
            </div>
        </div>

        <!-- 🎵 Synchronized Music Player Module -->
        <div class="card">
            <div class="media-lbl">🎵 Premium Audio Studio</div>
            
            <div class="audio-track">
                <span>🎵 Cyberpunk Synthwave Beat</span>
                <button onclick="playAudio('https://soundhelix.com', 'Synthwave')" style="padding:4px 8px; width:auto; font-size:9px;">▶ LOAD</button>
            </div>
            <div class="audio-track">
                <span>🎵 Cosmic Lo-Fi Chill Pulse</span>
                <button onclick="playAudio('https://soundhelix.com', 'Lo-Fi')" style="padding:4px 8px; width:auto; font-size:9px;">▶ LOAD</button>
            </div>

            <div style="font-size:10px; color:#fff; margin:8px 0; text-align:left;">
                NOW PLAYING: <span id="audio-status" style="color:#00d4ff; font-weight:bold;">NONE</span>
            </div>
            
            <div class="controls">
                <button onclick="globalAudio.play()">▶ PLAY</button>
                <button onclick="globalAudio.pause()">⏸ PAUSE</button>
                <button onclick="globalAudio.volume = Math.max(0, globalAudio.volume - 0.2)">🔉 VOL-</button>
            </div>
        </div>

        <!-- Decorated Brand Floor -->
        <div id="ftr">⚡ DEVELOPED BY SETH ⚡</div>
    </div>

    <script>
        // 1. Audio Engine Routing Initialization
        let globalAudio = new Audio();
        function playAudio(url, trackName) {
            globalAudio.src = url;
            globalAudio.play();
            document.getElementById('audio-status').innerText = trackName.toUpperCase() + " ACTIVE";
        }

        // 2. Sky-Blue Connected Network Space Nodes Matrix Engine
        const cv = document.getElementById('space'), c = cv.getContext('2d');
        const res = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
        window.onresize = res; res();

        const networkNodes = Array(22).fill(0).map(() => ({ 
            x: Math.random()*window.innerWidth, 
            y: Math.random()*window.innerHeight, 
            vx: (Math.random()-0.5)*0.8, 
            vy: (Math.random()-0.5)*0.8 
        }));

        function step() {
            c.fillStyle = "#020612"; c.fillRect(0, 0, cv.width, cv.height);
            networkNodes.forEach((n, i) => {
                n.x += n.vx; n.y += n.vy;
                if(n.x < 0 || n.x > cv.width) n.vx *= -1; 
                if(n.y < 0 || n.y > cv.height) n.vy *= -1;
                
                c.fillStyle = "rgba(0, 212, 255, 0.4)"; c.beginPath(); c.arc(n.x, n.y, 2, 0, Math.PI*2); c.fill();
                
                for (let j = i + 1; j < networkNodes.length; j++) {
                    const d = Math.hypot(n.x - networkNodes[j].x, n.y - networkNodes[j].y);
                    if (d < 130) { 
                        c.strokeStyle = `rgba(0, 212, 255, ${1 - d/130})`; 
                        c.lineWidth = 0.5; 
                        c.beginPath(); c.moveTo(n.x, n.y); c.lineTo(networkNodes[j].x, networkNodes[j].y); c.stroke(); 
                    }
                }
            });
            requestAnimationFrame(step);
        }
        step();
    </script>
</body>
</html>
