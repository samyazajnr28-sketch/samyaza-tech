<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samyaza & Akoth | Our Friendship</title>
    <!-- Importing a fancy font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #050505;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Twinkling Stars Background */
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 3.5rem; 
            color: #ffd700; /* Gold */
            text-shadow: 0 0 20px #ffd700;
            margin-bottom: 0.5rem;
        }

        .names { font-size: 2rem; letter-spacing: 5px; margin-bottom: 20px; }

        .timer { display: flex; gap: 30px; margin-top: 20px; }
        .unit { font-size: 1.5rem; }
        .label { font-size: 0.7rem; display: block; opacity: 0.7; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="container">
        <h1>Our Friendship</h1>
        <div class="names">Samyaza & Akoth</div>
        <p>Awaiting our first meeting on August 1st, 2026</p>

        <div class="timer">
            <div class="unit"><span id="days">00</span><span class="label">Days</span></div>
            <div class="unit"><span id="hours">00</span><span class="label">Hrs</span></div>
            <div class="unit"><span id="minutes">00</span><span class="label">Min</span></div>
            <div class="unit"><span id="seconds">00</span><span class="label">Sec</span></div>
        </div>
    </div>

    <script>
        // Starfield Logic
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const stars = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            opacity: Math.random()
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(Date.now() * 0.002 + s.opacity))})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Timer Logic
        const target = new Date("August 1, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
